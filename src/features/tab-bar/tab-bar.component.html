<ion-tabs>
  <ion-tab-bar slot="bottom" class="app-tab-bar">
    <ion-tab-button tab="workout" href="/tabs/workout">
      <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6.5 9.5v5M4 10.5v3M17.5 9.5v5M20 10.5v3M8 12h8"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linejoin="round" stroke-linecap="round" />
      </svg>
      <span class="tab-label">Workouts</span>
    </ion-tab-button>

    <ion-tab-button tab="exercise" href="/tabs/exercise">
      <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 6h16M4 12h16M4 18h10"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linejoin="round" stroke-linecap="round" />
      </svg>
      <span class="tab-label">Exercises</span>
    </ion-tab-button>

    <ion-tab-button tab="statistic" href="/tabs/statistic">
      <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 19V9m6 10V5m6 14v-7m6 7V11"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linejoin="round" stroke-linecap="round" />
      </svg>
      <span class="tab-label">Statistics</span>
    </ion-tab-button>

    <ion-tab-button tab="profile" href="/tabs/profile">
      <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="8" r="4"
                fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" />
      </svg>
      <span class="tab-label">Profile</span>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
